version: "3"

vars:
  DB_DSN: '{{.DB_DSN | default ""}}'
  MIGRATIONS_DIR: "./migrations"

tasks:
  help:
    desc: print this help message
    cmds:
      - task --list-all
    silent: true

  confirm:
    desc: confirmation prompt
    cmds:
      - |
        echo -n 'Are you sure? [y/N] ' && read ans && [ ${ans:-N} = y ]
    silent: true
    internal: true

  run:
    desc: run the backend application
    cmds:
      - go run ./cmd
  dev:
    desc: Run the app with live reloading
    cmds:
      - go tool air

  install-air:
    cmds:
      - go install github.com/air-verse/air@latest
    status:
      - command -v air >/dev/null 2>&1

  build:
    desc: build the backend binary
    cmds:
      - go build -o ./bin/backend ./cmd

  test:
    desc: run all backend tests
    cmds:
      - go test ./...

  tidy:
    desc: format .go files and tidy module dependencies
    cmds:
      - echo 'Formatting .go files...'
      - go fmt ./...
      - echo 'Tidying module dependencies...'
      - go mod tidy
      - echo 'Verifying dependencies...'
      - go mod verify

  migrations:install:
    desc: install goose migration CLI
    cmds:
      - go install github.com/pressly/goose/v3/cmd/goose@latest

  migrations:new:
    desc: create a new database migration (name=...)
    vars:
      NAME: '{{.name | default ""}}'
    cmds:
      - |
        if [ -z "{{.NAME}}" ]; then
          echo "Error: name parameter is required"
          echo "Usage: task migrations:new name=migration_name"
          exit 1
        fi
      - echo 'Creating migration file for {{.NAME}}...'
      - goose -dir {{.MIGRATIONS_DIR}} create {{.NAME}} sql

  migrations:up:
    desc: apply all up migrations (DB_DSN=...)
    deps: [confirm]
    requires:
      vars: [DB_DSN]
    cmds:
      - goose -dir {{.MIGRATIONS_DIR}} postgres "{{.DB_DSN}}" up

  migrations:status:
    desc: show migration status (DB_DSN=...)
    requires:
      vars: [DB_DSN]
    cmds:
      - goose -dir {{.MIGRATIONS_DIR}} postgres "{{.DB_DSN}}" status
